<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Reasonix Code</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0b0b;
        color: #e5e5e5;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        user-select: none;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        max-width: 80vw;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #333;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #status {
        font-size: 14px;
        color: #888;
        text-align: center;
        word-break: break-word;
        min-height: 20px;
        white-space: pre-wrap;
      }
      #status.error {
        color: #ff6b6b;
      }
      #actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }
      #actions button {
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        color: #fff;
        background: #2563eb;
        min-width: 180px;
        max-width: 70vw;
        white-space: pre-wrap;
        word-break: break-all;
      }
      #actions button.secondary {
        background: #333;
      }
      #actions button:hover {
        opacity: 0.9;
      }
      #actions button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <div id="status">Starting Reasonix…</div>
      <div id="actions"></div>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
