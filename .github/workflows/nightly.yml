name: Build nightly

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build binary
        run: bun build ./src/cli/index.ts --compile --outfile build/reasonix-code-nightly.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly build
          body: Auto-built from main branch. Updated on every push.
          files: build/reasonix-code-nightly.exe
          prerelease: true
