name: Build desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Rename installer to stable name
        shell: powershell
        run: |
          $exe = Get-ChildItem -Path "desktop/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "reasonix-desktop-windows.exe"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-desktop-windows
          path: reasonix-desktop-windows.exe

      - name: Publish Windows installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: reasonix-desktop-windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Rename installer to stable name
        run: |
          dmg=$(ls desktop/src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)
          cp "$dmg" reasonix-desktop-macos.dmg

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-desktop-macos
          path: reasonix-desktop-macos.dmg

      - name: Publish macOS installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: reasonix-desktop-macos.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Rename installer to stable name
        run: |
          deb=$(ls desktop/src-tauri/target/release/bundle/deb/*.deb | head -n 1)
          cp "$deb" reasonix-desktop-linux.deb

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-desktop-linux
          path: reasonix-desktop-linux.deb

      - name: Publish Linux installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: reasonix-desktop-linux.deb
