name: Build desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      VCToolsVersion: "14.44.35207"

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Node binary (bun compile)
        run: bun build ./src/cli/index.ts --compile --outfile desktop/src-tauri/binaries/node.exe

      - name: Verify Node binary size
        run: |
          $size = (Get-Item "desktop/src-tauri/binaries/node.exe").Length
          if ($size -lt 1048576) {  # 1 MB
            Write-Error "Node binary too small: $size bytes (min 1 MB)"
            exit 1
          }
          Write-Host "Node binary size: $([math]::Round($size / 1MB, 1)) MB"

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-desktop-windows
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Node binary (bun compile)
        run: bun build ./src/cli/index.ts --compile --outfile desktop/src-tauri/binaries/node

      - name: Verify Node binary size
        run: |
          SIZE=$(stat -f%z "desktop/src-tauri/binaries/node" 2>/dev/null || stat --format=%s "desktop/src-tauri/binaries/node")
          if [ "$SIZE" -lt 1048576 ]; then
            echo "Node binary too small: $SIZE bytes (min 1 MB)"
            exit 1
          fi
          echo "Node binary size: $(echo "scale=1; $SIZE / 1048576" | bc) MB"

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-desktop-macos
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Node binary (bun compile)
        run: bun build ./src/cli/index.ts --compile --outfile desktop/src-tauri/binaries/node

      - name: Verify Node binary size
        run: |
          SIZE=$(stat --format=%s "desktop/src-tauri/binaries/node")
          if [ "$SIZE" -lt 1048576 ]; then
            echo "Node binary too small: $SIZE bytes (min 1 MB)"
            exit 1
          fi
          echo "Node binary size: $(echo "scale=1; $SIZE / 1048576" | bc) MB"

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-desktop-linux
          path: desktop/src-tauri/target/release/bundle/deb/*.deb
