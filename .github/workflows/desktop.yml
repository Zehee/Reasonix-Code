name: Build desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-desktop-windows
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-desktop-macos
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-desktop-linux
          path: desktop/src-tauri/target/release/bundle/deb/*.deb

  publish:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish desktop installers to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          fail_on_unmatched_files: false
