name: Build desktop

# 桌面版只是一个打包壳，不跟随 CLI / tag 发布。
# 需要新桌面壳时，在 GitHub Actions 手动触发本 workflow。
# 产物用 build 号（github.run_number）后缀区分，版本号保持不变。
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Rename installer with build number
        shell: powershell
        run: |
          $exe = Get-ChildItem -Path "desktop/src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "reasonix-code-desktop-windows-build${{ github.run_number }}.exe"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-code-desktop-windows
          path: reasonix-code-desktop-windows-build${{ github.run_number }}.exe

      - name: Publish Windows installer to desktop release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Desktop build ${{ github.run_number }}
          files: reasonix-code-desktop-windows-build${{ github.run_number }}.exe

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Rename installer with build number
        run: |
          dmg=$(ls desktop/src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)
          cp "$dmg" "reasonix-code-desktop-macos-build${{ github.run_number }}.dmg"

      - name: Upload macOS .dmg
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-code-desktop-macos
          path: reasonix-code-desktop-macos-build${{ github.run_number }}.dmg

      - name: Publish macOS installer to desktop release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Desktop build ${{ github.run_number }}
          files: reasonix-code-desktop-macos-build${{ github.run_number }}.dmg

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node dependencies
        run: npm ci --ignore-scripts

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts

      - name: Build Tauri app
        working-directory: desktop
        run: npm run tauri build

      - name: Rename installer with build number
        run: |
          deb=$(ls desktop/src-tauri/target/release/bundle/deb/*.deb | head -n 1)
          cp "$deb" "reasonix-code-desktop-linux-build${{ github.run_number }}.deb"

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-code-desktop-linux
          path: reasonix-code-desktop-linux-build${{ github.run_number }}.deb

      - name: Publish Linux installer to desktop release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: desktop-latest
          name: Desktop build ${{ github.run_number }}
          files: reasonix-code-desktop-linux-build${{ github.run_number }}.deb
