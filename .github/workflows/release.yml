name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build binary
        run: bun build ./src/cli/index.ts --compile --outfile build/reasonix-code-${{ github.ref_name }}.exe

      - name: Copy to stable name
        shell: powershell
        run: Copy-Item "build/reasonix-code-${{ github.ref_name }}.exe" -Destination "build/reasonix-code-windows.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-code-windows
          path: build/reasonix-code-*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build binary
        run: bun build ./src/cli/index.ts --compile --outfile build/reasonix-code-${{ github.ref_name }}

      - name: Copy to stable name
        run: cp "build/reasonix-code-${{ github.ref_name }}" "build/reasonix-code-macos"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-code-macos
          path: build/reasonix-code-*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build binary
        run: bun build ./src/cli/index.ts --compile --outfile build/reasonix-code-${{ github.ref_name }}

      - name: Copy to stable name
        run: cp "build/reasonix-code-${{ github.ref_name }}" "build/reasonix-code-linux"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: reasonix-code-linux
          path: build/reasonix-code-*

  publish:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Make Linux/macOS binaries executable
        run: chmod +x artifacts/reasonix-code-macos artifacts/reasonix-code-linux artifacts/reasonix-code-v* || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
